<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Lectures - AILexity Academy</title>
    <!-- FontAwesome for Icons (Optional) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Reusing core styles for consistency */
        :root {
            --color-primary: #FF5733;
            --color-dark: #2D3436;
            --color-light: #F5F5F5;
            --color-text: #333;
            --color-border: #DDD;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--color-text);
            background: #F9F9F9;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 350px;
            background: white;
            border-right: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--color-border);
            background: var(--color-light);
        }

        .back-link {
            text-decoration: none;
            color: var(--color-primary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .course-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--color-dark);
            margin: 0;
        }

        .sidebar-progress {
            margin-top: 15px;
        }

        .progress-meta {
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .progress-track {
            height: 4px;
            background: #ddd;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--color-primary);
            width: 0%;
            transition: width 0.3s;
        }

        .modules-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .module-item {
            border-bottom: 1px solid var(--color-light);
        }

        .module-header {
            padding: 15px 20px;
            background: #fdfdfd;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .module-content {
            display: block;
            /* Visible by default */
        }

        .lesson-item {
            padding: 12px 20px 12px 35px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s;
            font-size: 14px;
            color: #555;
            border-left: 3px solid transparent;
        }

        .lesson-item:hover {
            background: #f0f0f0;
        }

        .lesson-item.active {
            background: #fff0ed;
            color: var(--color-primary);
            border-left: 3px solid var(--color-primary);
        }

        .lesson-icon {
            font-size: 14px;
            width: 20px;
            text-align: center;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
        }

        .video-container {
            background: #000;
            width: 100%;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .content-body {
            padding: 30px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .lesson-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--color-dark);
            margin-bottom: 15px;
        }

        .lesson-meta {
            color: #666;
            margin-bottom: 24px;
            display: flex;
            gap: 20px;
            font-size: 14px;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 20px;
        }

        .actions {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn-action {
            padding: 10px 20px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .btn-action:hover {
            background: var(--color-primary-hover);
        }

        .btn-action.secondary {
            background: white;
            color: var(--color-dark);
            border: 1px solid var(--color-border);
        }

        .btn-action.secondary:hover {
            background: var(--color-light);
        }

        .lesson-description {
            line-height: 1.7;
            color: #444;
        }

        .lesson-description h3 {
            font-size: 18px;
            margin-top: 25px;
            margin-bottom: 10px;
            color: var(--color-dark);
        }

        /* Responsive */
        @media (max-width: 900px) {
            body {
                flex-direction: column;
                height: auto;
                overflow: auto;
            }

            .sidebar {
                width: 100%;
                height: auto;
                max-height: 400px;
                border-bottom: 1px solid var(--color-border);
            }
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <a href="course-dashboard.html" class="back-link" id="backToDashboard">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
            <h2 class="course-title" id="courseTitle">Machine Learning Fundamentals</h2>
            <div class="sidebar-progress">
                <div class="progress-meta">
                    <span id="progressText">15% Completed</span>
                    <span>3/20 Lessons</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="courseProgress" style="width: 15%;"></div>
                </div>
            </div>
        </div>

        <div class="modules-list" id="modulesList">
            <!-- Content Injected via JS -->
            <div style="padding: 20px; text-align: center; color: #999;">Loading Curriculum...</div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Video Player -->
        <div class="video-container">
            <iframe id="videoPlayer" src="" title="Video Player" allowfullscreen
                poster="assets/placeholder.jpg"></iframe>
        </div>

        <div class="content-body">
            <h1 class="lesson-title" id="lessonTitle">Select a lesson to start</h1>

            <div class="lesson-meta">
                <span><i class="far fa-clock"></i> <span id="lessonDuration">10 mins</span></span>
                <span><i class="far fa-calendar"></i> Last updated: Jan 2025</span>
            </div>

            <div class="actions">
                <button class="btn-action" id="markCompleteBtn"><i class="fas fa-check"></i> Mark as Complete</button>
                <button class="btn-action secondary" id="nextLessonBtn">Next Lesson <i
                        class="fas fa-arrow-right"></i></button>
            </div>

            <div class="lesson-description" id="lessonDesc">
                <p>Welcome to the course! Please select a lesson from the sidebar to begin watching.</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const API_BASE_URL = 'http://localhost:5000/api';

        // Helper for API calls
        async function apiCall(endpoint) {
            const token = localStorage.getItem('ailexity_auth_token');
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = token;
            try {
                const res = await fetch(`${API_BASE_URL}${endpoint}`, { headers });
                return await res.json();
            } catch (err) { console.error(err); return []; }
        }

        // Global YouTube API Ready Function
        var player;
        function onYouTubeIframeAPIReady() {
            // Player will be initialized in loadLesson
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // Load YouTube API
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

            // 1. Get Course ID
            const urlParams = new URLSearchParams(window.location.search);
            const courseId = urlParams.get('courseId') || '1'; // Default to 1

            // 2. Setup Back Button
            const backLink = document.getElementById('backToDashboard');
            backLink.href = `course-dashboard.html?courseId=${courseId}`;

            // 3. Curriculum Data (Fetched from API or Local DB)
            let curriculum = await apiCall(`/courses/${courseId}/curriculum`);

            // Fallback to local DB if API fails
            if (!curriculum || curriculum.length === 0) {
                console.log("API unavailable, using local database curriculum.");
                curriculum = db.getCourseCurriculum(courseId);
            }

            // Flatten curriculum for easy navigation
            const allLessons = [];
            curriculum.forEach((mod, mIdx) => {
                if (mod.lessons) {
                    mod.lessons.forEach((less, lIdx) => {
                        allLessons.push({ ...less, mIdx, lIdx });
                    });
                }
            });

            // 4. Update Course Info (Mixed: still using DB for basic course info if API not available)
            // Ideally we'd have an API for course details too. 
            // For now, we assume db.js has the static course list (which it does)
            const course = db.getCourseById(courseId);
            if (course) {
                document.getElementById('courseTitle').textContent = course.title;
            }

            // 5. Progress Management
            updateProgressDisplay();

            function updateProgressDisplay() {
                const user = auth.getCurrentUser();
                if (user) {
                    // STILL USING LOCAL DB FOR PROGRESS. 
                    // Ideally progress should be on server, but for this task scope (content integration)
                    // we focus on content fetching.
                    const completed = db.getCompletedItems(user.id, courseId, 'VIDEO_COMPLETE').length;
                    const total = allLessons.length;
                    const percent = total === 0 ? 0 : Math.round((completed / total) * 100);

                    document.getElementById('progressText').textContent = `${completed}/${total} Lessons (${percent}%)`;
                    document.getElementById('courseProgress').style.width = `${percent}%`;
                }
            }

            let currentLessonId = null; // Track current lesson ID
            let currentIndex = 0; // Track flat index

            function markCurrentLessonComplete(autoAdvance = false) {
                const user = auth.getCurrentUser();
                if (!user || !currentLessonId) return;

                // Log specific activity (Local DB)
                const result = db.logActivity(user.id, courseId, 'VIDEO_COMPLETE', currentLessonId, {
                    timestamp: Date.now()
                });

                const btn = document.getElementById('markCompleteBtn');
                btn.innerHTML = '<i class="fas fa-check-double"></i> Completed';
                btn.classList.add('secondary');
                btn.disabled = true;

                updateProgressDisplay();

                // Update Sidebar Icon
                const activeItem = document.getElementById(`lesson-item-${currentLessonId}`);
                if (activeItem) {
                    activeItem.querySelector('.lesson-icon').innerHTML = '<i class="fas fa-check-circle" style="color: #4CAF50;"></i>';
                    activeItem.classList.add('completed');
                }

                if (result.success && !autoAdvance) {
                    // Alert is annoying users, toast is better if available, or silent
                    // alert(`Lesson marked as complete!`); 
                }

                if (autoAdvance) {
                    setTimeout(() => {
                        if (currentIndex < allLessons.length - 1) {
                            // Find next lesson
                            const next = allLessons[currentIndex + 1];
                            loadLesson(next.mIdx, next.lIdx);
                        } else {
                            if (typeof Toast !== 'undefined') Toast.show("Course Completed! Congratulations!", 'success');
                            else alert("Course Completed! Congratulations!");
                        }
                    }, 1500);
                }
            }

            document.getElementById('markCompleteBtn').addEventListener('click', function () {
                markCurrentLessonComplete(true);
            });

            document.getElementById('nextLessonBtn').addEventListener('click', function () {
                if (currentIndex < allLessons.length - 1) {
                    const next = allLessons[currentIndex + 1];
                    loadLesson(next.mIdx, next.lIdx);
                }
            });

            // 6. Render Sidebar
            let completedLessons = [];
            const user = auth.getCurrentUser();
            if (user) {
                completedLessons = db.getCompletedItems(user.id, courseId, 'VIDEO_COMPLETE');
            }

            const listContainer = document.getElementById('modulesList');
            listContainer.innerHTML = '';

            curriculum.forEach((module, mIdx) => {
                const modDiv = document.createElement('div');
                modDiv.className = 'module-item';

                let lessonsHtml = '';
                if (module.lessons) {
                    module.lessons.forEach((lesson, lIdx) => {
                        // Ensure lesson.id is handled (it might be number or string from server)
                        const isCompleted = completedLessons.includes(lesson.id) || completedLessons.includes(String(lesson.id));
                        const icon = isCompleted ? '<i class="fas fa-check-circle" style="color: #4CAF50;"></i>' : '<i class="fas fa-play-circle"></i>';

                        lessonsHtml += `
                            <div class="lesson-item ${isCompleted ? 'completed' : ''}" onclick="loadLesson(${mIdx}, ${lIdx})" id="lesson-item-${lesson.id}">
                                <span class="lesson-icon">${icon}</span>
                                <div>${lesson.title}</div>
                            </div>
                        `;
                    });
                }

                modDiv.innerHTML = `
                    <div class="module-header">${module.title}</div>
                    <div class="module-content">${lessonsHtml}</div>
                `;
                listContainer.appendChild(modDiv);
            });

            // 7. Global Load Function
            window.loadLesson = function (mIdx, lIdx) {
                if (!curriculum[mIdx] || !curriculum[mIdx].lessons[lIdx]) return;

                const lesson = curriculum[mIdx].lessons[lIdx];
                currentLessonId = lesson.id;

                // Find flat index
                currentIndex = allLessons.findIndex(l => l.id === lesson.id);

                // Update active state
                document.querySelectorAll('.lesson-item').forEach(el => el.classList.remove('active'));
                const activeItem = document.getElementById(`lesson-item-${lesson.id}`);
                if (activeItem) activeItem.classList.add('active');

                // Check completion status for button
                const btn = document.getElementById('markCompleteBtn');
                const isCompleted = user && (db.getCompletedItems(user.id, courseId, 'VIDEO_COMPLETE').includes(lesson.id) || db.getCompletedItems(user.id, courseId, 'VIDEO_COMPLETE').includes(String(lesson.id)));

                if (isCompleted) {
                    btn.innerHTML = '<i class="fas fa-check-double"></i> Completed';
                    btn.classList.add('secondary');
                    btn.disabled = true;
                } else {
                    btn.innerHTML = '<i class="fas fa-check"></i> Mark as Complete';
                    btn.classList.remove('secondary');
                    btn.disabled = false;
                }

                // Content Update
                document.getElementById('lessonTitle').textContent = lesson.title;
                document.getElementById('lessonDuration').textContent = lesson.duration;
                document.getElementById('lessonDesc').innerHTML = `<h3>About this lesson</h3><p>${lesson.desc}</p>`;

                // LOG LESSON VIEW
                if (user && db) {
                    db.logActivity(user.id, courseId, 'LESSON_VIEW', lesson.id, { title: lesson.title });
                }

                // Video Update (YouTube API)
                if (player && typeof player.loadVideoById === 'function') {
                    player.loadVideoById(lesson.videoId);
                } else {
                    const container = document.querySelector('.video-container');
                    container.innerHTML = '<div id="player"></div>';

                    player = new YT.Player('player', {
                        height: '100%',
                        width: '100%',
                        videoId: lesson.videoId,
                        playerVars: {
                            'playsinline': 1,
                            'autoplay': 1
                        },
                        events: {
                            'onReady': onPlayerReady,
                            'onStateChange': onPlayerStateChange
                        }
                    });
                }
            };

            function onPlayerReady(event) {
                event.target.playVideo();
            }

            function onPlayerStateChange(event) {
                // YT.PlayerState.ENDED is 0
                if (event.data === 0) {
                    markCurrentLessonComplete(true);
                }
            }

            // Auto-load first lesson
            if (allLessons.length > 0) loadLesson(0, 0);
        });
    </script>
</body>

</html>

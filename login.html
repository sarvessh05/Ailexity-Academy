<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AILexity Academy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/theme.css">
    <style>
        :root {
            --color-primary: #FF5733;
            --color-primary-hover: #e05858;
            --color-dark: #2D3436;
            --color-light: #F5F5F5;
            --color-text: #333;
            --color-border: #DDD;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F9F9F9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--color-border);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--color-dark);
            text-decoration: none;
            display: block;
            margin-bottom: 16px;
        }

        .auth-logo span {
            color: var(--color-primary);
        }

        .auth-title {
            font-size: 24px;
            color: var(--color-dark);
            margin-bottom: 8px;
        }

        .auth-subtitle {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--color-dark);
            font-weight: 500;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--color-border);
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
        }

        .forgot-password {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 500;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background: var(--color-primary-hover);
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #666;
        }

        .auth-link {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
        }

        .error-message {
            background: #ffe6e6;
            color: #d63031;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="homepage.html" class="auth-logo">AILexity <span>Academy</span></a>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Log in to continue your learning journey</p>
            </div>

            <div id="error-message" class="error-message"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" required placeholder="name@example.com">
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" required placeholder="••••••••">
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="forgot-password.html" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn-submit">Log In</button>
            </form>

            <div class="social-login">
                <div class="divider">or continue with</div>
                <a href="http://localhost:5000/api/auth/google" class="social-btn btn-google">
                    <i class="fab fa-google social-icon" style="color: #DB4437;"></i> Google
                </a>
                <a href="http://localhost:5000/api/auth/facebook" class="social-btn btn-facebook">
                    <i class="fab fa-facebook social-icon"></i> Facebook
                </a>
            </div>

            <div class="auth-footer">
                Don't have an account? <a href="register.html" class="auth-link">Sign up</a>
            </div>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/toast.js"></script>
    <script>
        // Redirect if already logged in
        (function checkSession() {
            const user = auth.getCurrentUser();
            if (user) {
                window.location.href = 'student-dashboard.html';
            }
        })();

        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const btn = this.querySelector('button[type="submit"]');
            const originalText = 'Log In';
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Authenticate with Server
                const result = await auth.login(email, password);

                if (result.success) {
                    if (typeof Toast !== 'undefined') Toast.show('Login successful! Redirecting...', 'success');
                    setTimeout(() => window.location.href = 'student-dashboard.html', 1000);
                } else {
                    if (typeof Toast !== 'undefined') Toast.show(result.message || 'Login failed', 'error');
                    else alert(result.message || 'Login failed');

                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (err) {
                console.error('Login error:', err);
                if (typeof Toast !== 'undefined') Toast.show('An error occurred. Please try again.', 'error');
                else alert('An error occurred. Please try again.');

                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>

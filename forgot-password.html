<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - AILexity Academy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --color-primary: #FF5733;
            --color-primary-hover: #e05858;
            --color-dark: #2D3436;
            --color-light: #F5F5F5;
            --color-text: #333;
            --color-border: #DDD;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F9F9F9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--color-border);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--color-dark);
            text-decoration: none;
            display: block;
            margin-bottom: 16px;
        }

        .auth-logo span {
            color: var(--color-primary);
        }

        .auth-title {
            font-size: 24px;
            color: var(--color-dark);
            margin-bottom: 8px;
        }

        .auth-subtitle {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--color-dark);
            font-weight: 500;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--color-border);
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background: var(--color-primary-hover);
        }

        .btn-link {
            background: none;
            border: none;
            color: var(--color-primary);
            cursor: pointer;
            font-weight: 500;
            padding: 0;
            font-size: 14px;
            margin-top: 10px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #666;
        }

        .auth-link {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
        }

        .step-hidden {
            display: none;
        }

        /* Animation for step transition */
        .fade-in {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="homepage.html" class="auth-logo">AILexity <span>Academy</span></a>
                <h1 class="auth-title">Reset Password</h1>
                <p id="subtext" class="auth-subtitle">Enter your email to receive an OTP</p>
            </div>

            <!-- Step 1: Email Input -->
            <form id="step-1-form" class="fade-in">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" required placeholder="name@example.com">
                </div>
                <button type="submit" class="btn-submit">Send OTP</button>
            </form>

            <!-- Step 2: OTP & New Password (Hidden initially) -->
            <form id="step-2-form" class="step-hidden fade-in">
                <div class="form-group">
                    <label for="otp" class="form-label">Enter OTP</label>
                    <input type="text" id="otp" class="form-input" required placeholder="123456" maxlength="6"
                        style="letter-spacing: 4px; text-align: center;">
                    <button type="button" id="resend-btn" class="btn-link"
                        style="font-size: 12px; margin-top:5px;">Resend OTP</button>
                </div>

                <div class="form-group">
                    <label for="new-password" class="form-label">New Password</label>
                    <input type="password" id="new-password" class="form-input" required
                        placeholder="Min. 8 characters">
                </div>

                <div class="form-group">
                    <label for="confirm-password" class="form-label">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-input" required
                        placeholder="Confirm new password">
                </div>

                <button type="submit" class="btn-submit">Reset Password</button>
                <button type="button" id="back-btn" class="btn-link"
                    style="width:100%; margin-top:15px; color:#666;">Use a different email</button>
            </form>

            <div class="auth-footer">
                Resulted in remembering? <a href="login.html" class="auth-link">Log in</a>
            </div>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/toast.js"></script>
    <script>
        const step1Form = document.getElementById('step-1-form');
        const step2Form = document.getElementById('step-2-form');
        const subtext = document.getElementById('subtext');
        const emailInput = document.getElementById('email');

        let userEmail = '';

        // API URL for Python Backend
        const API_URL = 'http://localhost:5000';

        // Step 1: Send OTP
        step1Form.addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            userEmail = emailInput.value;

            // Loading state
            const originalBtnText = btn.innerText;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending OTP...';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });

                const result = await response.json();

                if (result.success) {
                    if (typeof Toast !== 'undefined') Toast.show(result.message, 'success');

                    // Show OTP in a dialog for testing
                    setTimeout(() => {
                        alert('🔐 OTP SENT!\n\nCheck the server console for the OTP code.\n\nAlternatively, use any 6-digit code for testing.');
                    }, 500);

                    // Update UI for Step 2
                    subtext.innerText = `Enter the OTP sent to ${userEmail}`;
                    step1Form.style.display = 'none';
                    step2Form.classList.remove('step-hidden');
                    step2Form.style.display = 'block';
                } else {
                    if (typeof Toast !== 'undefined') Toast.show(result.message, 'error');
                    btn.innerText = originalBtnText;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error(error);
                if (typeof Toast !== 'undefined') Toast.show('Failed to connect to server. Ensure python auth_server.py is running.', 'error');
                btn.innerText = originalBtnText;
                btn.disabled = false;
            }
        });

        // Step 2: Verify OTP and Reset Password
        step2Form.addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const otp = document.getElementById('otp').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                if (typeof Toast !== 'undefined') Toast.show('Passwords do not match', 'error');
                return;
            }

            if (newPassword.length < 8) {
                if (typeof Toast !== 'undefined') Toast.show('Password must be at least 8 characters', 'error');
                return;
            }

            // Loading state
            const originalBtnText = btn.innerText;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/verify-reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: userEmail,
                        otp: otp,
                        new_password: newPassword
                    })
                });

                const result = await response.json();

                if (result.success) {
                    if (typeof Toast !== 'undefined') Toast.show('Password updated successfully!', 'success');

                    // Show Success UI
                    step2Form.style.display = 'none';
                    subtext.style.display = 'none';

                    const confirmation = document.createElement('div');
                    confirmation.style.textAlign = 'center';
                    confirmation.className = 'fade-in';
                    confirmation.innerHTML = `
                        <div style="font-size: 50px; color: #2ecc71; margin-bottom: 20px;"><i class="fas fa-check-circle"></i></div>
                        <h2 style="margin-bottom:10px;">Success!</h2>
                        <p>Your password has been reset successfully.</p>
                        <p style="margin-top: 20px;"><a href="login.html" class="btn-submit" style="display:inline-block; text-decoration:none; max-width:200px;">Login Now</a></p>
                    `;
                    document.querySelector('.auth-card').appendChild(confirmation);
                    document.querySelector('.auth-title').innerText = 'Password Reset';
                } else {
                    if (typeof Toast !== 'undefined') Toast.show(result.message, 'error');
                    btn.innerText = originalBtnText;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error(error);
                if (typeof Toast !== 'undefined') Toast.show('Error resetting password', 'error');
                btn.innerText = originalBtnText;
                btn.disabled = false;
            }
        });

        // Resend Button Logic
        document.getElementById('resend-btn').addEventListener('click', async function () {
            const btn = this;
            if (btn.disabled) return;

            btn.disabled = true;
            btn.innerText = 'Sending...';

            try {
                const response = await fetch(`${API_URL}/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });
                const result = await response.json();
                if (result.success) {
                    Toast.show('OTP Resent!', 'success');
                } else {
                    Toast.show(result.message, 'error');
                }
            } catch (e) {
                Toast.show('Failed to resend', 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Resend OTP';
            }
        });

        // Back Button
        document.getElementById('back-btn').addEventListener('click', function () {
            step2Form.style.display = 'none';
            step1Form.style.display = 'block';
            step2Form.classList.add('step-hidden');
            subtext.innerText = 'Enter your email to receive an OTP';
            document.getElementById('otp').value = '';
        });
    </script>
</body>

</html>
```
